events {
    worker_connections 1024;
}

http {
    # CORS Global Configuration
    map $http_origin $cors_origin {
        default "";
        "~^https?://.*" $http_origin;
    }

    server {
        listen 80;
        
        # Permitir CORS globalmente si es necesario
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Citas (8001)
        location /citas {
            proxy_pass http://api-citas:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Expedientes (8002)
        location /expedientes {
            proxy_pass http://api-expedientes:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Quirofanos (8003)
        location /quirofanos {
            proxy_pass http://api-quirofanos:8000; # asumiendo que Go usa 8000 por defecto en contenedor
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Insumos (8004)
        location /insumos {
            proxy_pass http://api-insumos:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Personal (8005)
        location /personal {
            proxy_pass http://api-personal:8005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Compiladores SQL (8006)
        location /sql {
            proxy_pass http://api-compiladores:8000; # Go container
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Healthchecks y docs (opcional)
        location /docs {
            proxy_pass http://api-citas:8001/docs; # o rutear segun convenga
        }
    }
}
