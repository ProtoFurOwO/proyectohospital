<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compiladores SQL</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Motor SQL - Compiladores</h1>
        <p>Servicio separado para analisis lexico, sintactico y semantico</p>
      </div>
      <span class="badge">Puerto 8006</span>
    </header>

    <main class="container">
      <section class="panel editor-panel">
        <h2>Editor SQL</h2>
        <textarea id="query" spellcheck="false"></textarea>

        <div class="actions">
          <button id="runBtn" class="btn success">Ejecutar (Ctrl+Enter)</button>
          <button id="clearBtn" class="btn">Limpiar</button>
          <button id="clearLogsBtn" class="btn warning">Limpiar logs</button>
        </div>

        <div class="examples">
          <p>Ejemplos:</p>
          <div id="examples"></div>
        </div>

        <div id="result" class="result hidden"></div>
      </section>

      <section class="panel output-panel">
        <h2>Tokens</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Linea</th>
                <th>Columna</th>
              </tr>
            </thead>
            <tbody id="tokensBody"></tbody>
          </table>
        </div>

        <h2>Logs</h2>
        <div id="logs" class="logs"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
